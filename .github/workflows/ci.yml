name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
      # 1. GitHub 저장소의 코드를 체크아웃합니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker 빌드 환경(QEMU 지원 포함)을 설정합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (Pull Request인 경우 이 단계를 건너뜁니다)
      # GitHub 설정의 Secrets (DOCKERHUB_USERNAME, DOCKERHUB_TOKEN)를 사용합니다.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지 빌드 및 푸시
      # GHA 캐시 타겟을 사용하여 이후 빌드 속도를 비약적으로 향상시킵니다.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 메인 브랜치 푸시에 대해서만 실제 Docker Hub에 이미지를 push합니다.
          push: ${{ github.event_name != 'pull_request' }}
          # 본인의 Docker Hub 사용자 이름과 레포지토리 이름으로 구성하세요.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-project:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: docker # docker 빌드/푸시 작업이 끝난 후에 실행됩니다.
    if: github.event_name != 'pull_request' # PR에서는 배포하지 않고 오직 push(main 병합 등)시에만 배포
    runs-on: self-hosted # 로컬 컴퓨터에 설정해둔 GitHub Runner 환경에서 구동됩니다.
    
    steps:
      - name: Log in to Docker Hub
        # private 이미지라면 이 단계가 필수입니다.
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
      - name: Stop and Remove Old Container
        run: |
          echo "기존 컨테이너가 있다면 중지 및 삭제합니다..."
          docker stop age-prediction-api || true
          docker rm age-prediction-api || true
          
      - name: Pull Latest Image
        run: |
          echo "새로 빌드된 최신 이미지를 로컬로 가져옵니다..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-project:latest
        
      - name: Run New Container
        run: |
          echo "새로운 컨테이너를 구동합니다..."
          docker run -d \
            --name age-prediction-api \
            --restart unless-stopped \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-project:latest
